<script>
if (localStorage.getItem("aml_logged") !== "true") {
    location.href = "login.html";
}
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimLockMenu_IOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            border: 3px solid #ff6b35;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
        }
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .user-bar .key-name { color: #ff6b35; font-weight: bold; }
        .user-bar .expiry { color: #00ff99; }
        .user-bar .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .iframe-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 2px solid #ff6b35;
            height: 600px;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 13px;
        }
        .tab-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255, 107, 53, 0.2);
            color: white;
            border: 2px solid #ff6b35;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .tab-btn:hover {
            background: rgba(255, 107, 53, 0.4);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: #ff6b35;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.5);
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 53, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(150%);
            transition: transform 0.5s ease;
            z-index: 1000;
            font-weight: bold;
        }
        .notification.show { transform: translateX(0); }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 107, 53, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AimLockMenu_IOS</h1>
            <div class="subtitle">AIMLOCK MENU V1 | 25 TÍNH NĂNG SIÊU VIP</div>
        </div>

        <div class="user-bar">
            <span>🔑 Key: <span class="key-name" id="displayKey">---</span></span>
            <span>⏳ Hạn: <span class="expiry" id="displayExpiry">---</span></span>
            <button class="logout-btn" onclick="logout()">🚪 Đăng xuất</button>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('menu')">🎮 MENU</button>
            <button class="tab-btn" onclick="showTab('cpu')">⚡ TỐI ƯU MÁY</button>
            <button class="tab-btn" onclick="showTab('key')">🔑 CHECK KEY</button>
            <button class="tab-btn" onclick="showTab('about')">ℹ️ ABOUT</button>
        </div>
        
        <div class="menu-container">
            <div class="iframe-container">
                <iframe id="contentFrame" src="menu.html"></iframe>
            </div>
        </div>
        
        <div class="footer">
            © AimLockMenu_IOS | 25 TÍNH NĂNG VIP | iOS 12-20
        </div>
    </div>
    
    <div class="notification" id="notification">Tính năng đã kích hoạt!</div>

    <script>
        (function() {
            const logged = localStorage.getItem("aml_logged");
            const expiry = localStorage.getItem("aml_expiry");
            if (logged !== "true" || !expiry) {
                window.location.href = "login.html";
                return;
            }
            const expDate = new Date(expiry);
            const today = new Date();
            if (today > expDate) {
                alert("Key đã hết hạn! Vui lòng đăng nhập lại.");
                localStorage.clear();
                window.location.href = "login.html";
                return;
            }
            document.getElementById("displayKey").textContent = localStorage.getItem("aml_key") || "---";
            const daysLeft = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
            document.getElementById("displayExpiry").textContent = daysLeft + " ngày";
        })();

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const tabMap = { 'menu': 0, 'cpu': 1, 'key': 2, 'about': 3 };
            if (tabMap[tabName] !== undefined) {
                document.querySelectorAll('.tab-btn')[tabMap[tabName]].classList.add('active');
            }
            document.getElementById('contentFrame').src = tabName + '.html';
        }

        window.showNotification = function(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.background = isError ? 'rgba(255, 68, 68, 0.9)' : 'rgba(255, 107, 53, 0.9)';
            notification.classList.add('show');
            setTimeout(() => { notification.classList.remove('show'); }, 3000);
        };

        function logout() {
            if (confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.removeItem("aml_logged");
                localStorage.removeItem("aml_key");
                localStorage.removeItem("aml_expiry");
                localStorage.removeItem("aml_role");
                window.location.href = "login.html";
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            showTab('menu');
        });
    </script>
</body>
</html>
